---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mlflow
  namespace: flux-system
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: experiment-tracking
spec:
  interval: 10m
  timeout: 15m
  targetNamespace: ml-platform
  releaseName: mlflow
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: mlflow
      version: "1.4.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    postgresql:
      enabled: false
    minio:
      enabled: false
    externalDatabase:
      host: postgresql.ml-platform.svc.cluster.local
      port: 5432
      user: mlflow
      database: mlflow
      authDatabase: mlflow_auth
      existingSecret: mlflow-postgresql
      existingSecretPasswordKey: db-password
    externalGCS:
      bucket: ${gcp_project}-mlflow
      googleCloudProject: ${gcp_project}
      useCredentialsInSecret: false
      serveArtifacts: true
    tracking:
      auth:
        enabled: true
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
