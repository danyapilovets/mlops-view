---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: flux-system
  labels:
    app.kubernetes.io/name: airflow
    app.kubernetes.io/component: orchestration
spec:
  interval: 10m
  timeout: 20m
  targetNamespace: ml-platform
  releaseName: airflow
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: airflow
      version: "1.15.x"
      sourceRef:
        kind: HelmRepository
        name: apache-airflow
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    executor: KubernetesExecutor
    config:
      core:
        dags_are_paused_at_creation: "False"
        load_examples: "False"
      kubernetes:
        namespace: ml-platform
        worker_container_repository: apache/airflow
        worker_container_tag: "2.8.4"
    webserver:
      defaultUser:
        enabled: true
        role: Admin
        username: admin
    workers:
      enabled: false
    redis:
      enabled: false
    scheduler:
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
    triggerer:
      enabled: true
    dags:
      gitSync:
        enabled: true
        repo: https://github.com/example-org/mlops-airflow-dags.git
        branch: main
        rev: HEAD
        depth: 1
        subPath: "dags"
        wait: 60
        containerName: git-sync
    postgresql:
      enabled: true
      auth:
        username: airflow
        database: airflow
