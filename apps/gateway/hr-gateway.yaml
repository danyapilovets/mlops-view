---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ml-gateway
  namespace: flux-system
  labels:
    app.kubernetes.io/name: ml-gateway
    app.kubernetes.io/component: api-gateway
spec:
  interval: 10m
  timeout: 10m
  targetNamespace: gateway
  releaseName: ml-gateway
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: helm/ml-gateway
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    replicaCount: 2
    env:
      ENVIRONMENT: ${environment}
      GCP_PROJECT: ${gcp_project}
      GCP_REGION: ${gcp_region}
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 20
      targetCPUUtilizationPercentage: 70
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 512Mi
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
