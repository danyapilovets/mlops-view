apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-serving.fullname" . }}-download
  labels:
    {{- include "llm-serving.labels" . | nindent 4 }}
data:
  download_model.py: |
    #!/usr/bin/env python3
    import os
    import subprocess
    import sys

    def main() -> None:
        source = os.environ.get("MODEL_SOURCE", "").strip()
        if not source:
            print("MODEL_SOURCE is required", file=sys.stderr)
            sys.exit(1)
        dest = os.environ.get("MODEL_DEST", "/models").strip()
        os.makedirs(dest, exist_ok=True)
        subprocess.run(["gsutil", "-m", "cp", "-r", source, dest], check=True)

    if __name__ == "__main__":
        main()
