{{- if .Values.serviceMonitor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ml-gateway.fullname" . }}-metrics
  labels:
    {{- include "ml-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - port: 9113
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "ml-gateway.selectorLabels" . | nindent 4 }}
{{- end }}
