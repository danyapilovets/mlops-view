{{- define "ml-gateway.nginx.conf" -}}
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /var/log/nginx/access.log combined;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 0;
{{- if .Values.rateLimiting.enabled }}
  limit_req_status 429;
  limit_req_zone $binary_remote_addr zone=llm_rl:{{ .Values.rateLimiting.zoneSize }} rate={{ include "ml-gateway.nginxRate" . }};
{{- end }}

  upstream llm_backend {
{{- range .Values.backends }}
    server {{ include "ml-gateway.backendHostPort" . }} weight={{ .weight }};
{{- end }}
    keepalive 32;
  }

  server {
    listen 80;
{{- if .Values.rateLimiting.enabled }}
    limit_req zone=llm_rl burst={{ .Values.rateLimiting.burst }} nodelay;
{{- end }}

    location / {
      proxy_pass http://llm_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
{{- if .Values.serviceMonitor.enabled }}

  server {
    listen 127.0.0.1:8080;
    location /stub_status {
      stub_status on;
      allow 127.0.0.1;
      deny all;
    }
  }
{{- end }}
}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ml-gateway.fullname" . }}-nginx
  labels:
    {{- include "ml-gateway.labels" . | nindent 4 }}
data:
  nginx.conf: |
{{ include "ml-gateway.nginx.conf" . | nindent 4 }}
