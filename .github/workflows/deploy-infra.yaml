---
name: Terraform plan and apply

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/deploy-infra.yaml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/deploy-infra.yaml"
  workflow_dispatch:
    inputs:
      action:
        description: Terraform operation to run (manual runs only)
        type: choice
        default: plan
        options:
          - plan
          - apply
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
    name: Terraform plan (${{ matrix.environment }})
    runs-on: ${{ vars.USE_GITHUB_HOSTED_RUNNER == 'true' && 'ubuntu-latest' || fromJSON('["self-hosted", "k8s-runners"]') }}
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform plan
        run: |
          set -euo pipefail
          terraform plan -no-color -input=false \
            -var-file="environments/${{ matrix.environment }}.tfvars" \
            -out=tfplan-${{ matrix.environment }}.bin

      - name: Show plan text (PR)
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan-${{ matrix.environment }}.bin

  terraform-apply:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    name: Terraform apply (${{ matrix.environment }})
    runs-on: ${{ vars.USE_GITHUB_HOSTED_RUNNER == 'true' && 'ubuntu-latest' || fromJSON('["self-hosted", "k8s-runners"]') }}
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform apply
        run: |
          set -euo pipefail
          terraform plan -no-color -input=false \
            -var-file="environments/${{ matrix.environment }}.tfvars" \
            -out=tfplan-${{ matrix.environment }}.bin
          terraform apply -auto-approve -input=false tfplan-${{ matrix.environment }}.bin

  drift-detection:
    if: github.event_name == 'schedule'
    name: Terraform drift (${{ matrix.environment }})
    runs-on: ${{ vars.USE_GITHUB_HOSTED_RUNNER == 'true' && 'ubuntu-latest' || fromJSON('["self-hosted", "k8s-runners"]') }}
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Detect drift
        shell: bash
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -input=false \
            -var-file="environments/${{ matrix.environment }}.tfvars"
          code=$?
          set -e
          if [[ "${code}" -eq 2 ]]; then
            echo "::error::Drift detected for ${{ matrix.environment }} (terraform plan exit code 2)"
            exit 1
          fi
          if [[ "${code}" -ne 0 ]]; then
            echo "::error::terraform plan failed with exit code ${code}"
            exit "${code}"
          fi
          echo "No drift for ${{ matrix.environment }}."
